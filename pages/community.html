<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Community Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/community.css">
</head>
<body>

<div id="connection-banner"><span class="dot"></span><span id="connection-text">Reconnecting…</span></div>

<div id="app">
  <div id="topbar">
    <div class="msg-count">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      <span id="msg-count-number">0</span> messages
    </div>
  </div>

  <div id="main">
    <section id="chat-panel" aria-label="Community chat">
      <div id="messages" role="log" aria-live="polite" aria-label="Messages"></div>

      <div id="composer-area">
        <div class="inline-warning" id="spam-warning">Slow down a little — please wait a moment before sending again.</div>
        <div id="chatting-as">chatting as <b id="chatting-as-name">—</b></div>
        <form id="composer" autocomplete="off">
          <textarea id="msg-input" rows="1" maxlength="500" placeholder="say something…" aria-label="Message"></textarea>
          <button type="submit" id="send-btn" aria-label="Send message">send ↵</button>
        </form>
      </div>
    </section>
  </div>
</div>

<div id="name-modal-overlay">
  <div id="name-modal" role="dialog" aria-modal="true" aria-labelledby="name-modal-title">
    <div class="eyebrow">Welcome</div>
    <h2 id="name-modal-title">Pick a display name</h2>
    <p>Choose the name others will see next to your messages.</p>
    <label for="name-input" class="visually-hidden">Display name</label>
    <input id="name-input" type="text" maxlength="24" placeholder="e.g. Blue Fox" />
    <div id="name-error"></div>
    <button id="name-continue" type="button">Continue</button>
  </div>
</div>

<script type="module" src="../assets/js/community.js"></script>
</body>
</html>
